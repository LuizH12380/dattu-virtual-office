<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dattu — Escritório Virtual</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --bg: #1a1025;
      --surface: #221832;
      --surface2: #2c2042;
      --border: #3a2d55;
      --text: #e8e0f0;
      --text-muted: #8878a0;
      --accent: #7c6ff7;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --blue: #60a5fa;
      --purple: #c084fc;
      --pink: #f472b6;
      --floor1: #5c4a32;
      --floor2: #4e3e28;
      --wall-top: #3d2d4a;
      --wall-side: #2e1f3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pixel-font { font-family: 'Press Start 2P', monospace; }

    /* ═══ Header ═══ */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 46px;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      flex-shrink: 0; z-index: 20;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-px {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #7c6ff7, #c084fc);
      border-radius: 4px; image-rendering: pixelated;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      box-shadow: 0 2px 0 #4a3d80;
    }
    .logo-text { font-family: 'Press Start 2P', monospace; font-size: 11px; color: var(--text); }
    .hdr-right { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-muted); }
    .conn-dot {
      width: 8px; height: 8px; border-radius: 2px;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    /* ═══ Main Layout ═══ */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ═══ Sidebar ═══ */
    .sidebar {
      width: 270px; flex-shrink: 0;
      background: var(--surface);
      border-right: 2px solid var(--border);
      display: flex; flex-direction: column;
    }
    .sb-sec { padding: 12px; border-bottom: 1px solid var(--border); }
    .sb-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted);
      margin-bottom: 8px;
    }
    .task-ta {
      width: 100%; background: var(--surface2);
      border: 2px solid var(--border); border-radius: 4px;
      padding: 8px 10px; color: var(--text);
      font-size: 12px; font-family: inherit;
      resize: none; min-height: 60px; outline: none;
    }
    .task-ta:focus { border-color: var(--accent); }
    .task-ta::placeholder { color: var(--text-muted); }
    .task-row { display: flex; gap: 5px; margin-top: 6px; align-items: center; }
    .sel {
      background: var(--surface2); border: 2px solid var(--border);
      color: var(--text); border-radius: 4px; padding: 5px 6px;
      font-size: 11px; font-family: inherit; outline: none;
    }
    .btn {
      padding: 6px 12px; border-radius: 4px; border: none;
      cursor: pointer; font-size: 11px; font-weight: 700;
      font-family: inherit; transition: all .12s; white-space: nowrap;
      box-shadow: 0 2px 0 rgba(0,0,0,.3);
    }
    .btn:active { transform: translateY(2px); box-shadow: none; }
    .btn-pri { background: var(--accent); color: #fff; }
    .btn-pri:hover { background: #6a5de0; }
    .btn-pri:disabled { opacity: .5; cursor: default; }
    .btn-sec { background: var(--surface2); color: var(--text); border: 2px solid var(--border); }
    .btn-sec:hover { border-color: var(--accent); }
    .qb-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .qb {
      padding: 3px 7px; border-radius: 3px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: 9px;
      cursor: pointer; font-family: inherit;
    }
    .qb:hover { border-color: var(--accent); color: var(--accent); }
    .prog { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .prog-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--purple)); transition: width .3s; }

    /* Vault */
    .vault-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .vc {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; padding: 4px 6px; font-size: 10px;
      cursor: pointer; display: flex; align-items: center; gap: 3px;
    }
    .vc:hover { border-color: var(--accent); }
    .vc b { color: var(--accent); }

    /* Feed */
    .feed-lbl {
      padding: 8px 12px 2px;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; text-transform: uppercase;
      color: var(--text-muted);
    }
    .feed { flex: 1; overflow-y: auto; padding: 6px 12px; }
    .feed::-webkit-scrollbar { width: 3px; }
    .feed::-webkit-scrollbar-thumb { background: var(--border); }
    .fi { display: flex; gap: 6px; margin-bottom: 5px; animation: fin .2s ease-out; }
    @keyframes fin { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }
    .fd { width: 6px; height: 6px; border-radius: 2px; flex-shrink: 0; margin-top: 4px; }
    .fd.info{background:var(--blue)} .fd.success{background:var(--green)}
    .fd.error{background:var(--red)} .fd.working{background:var(--yellow)}
    .fd.note{background:var(--purple)}
    .ft { font-size: 11px; line-height: 1.35; }
    .ftm { font-size: 9px; color: var(--text-muted); }

    /* ═══ Office ═══ */
    .office-wrap {
      flex: 1; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: #0d0816;
    }

    .office {
      position: relative;
      width: 820px; height: 560px;
      border: 4px solid var(--wall-side);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,.5), inset 0 0 80px rgba(0,0,0,.3);
      image-rendering: pixelated;
    }

    /* Floor */
    .office-floor {
      position: absolute; inset: 0;
      background-color: #5a4530;
      background-image:
        repeating-linear-gradient(90deg,
          #5a4530 0px, #5a4530 39px,
          #4e3a26 39px, #4e3a26 40px
        ),
        repeating-linear-gradient(0deg,
          transparent 0px, transparent 39px,
          rgba(0,0,0,.08) 39px, rgba(0,0,0,.08) 40px
        );
      background-size: 40px 40px;
    }

    /* Walls */
    .wall-top {
      position: absolute; top: 0; left: 0; right: 0; height: 32px;
      background: linear-gradient(180deg, #3d2d52 0%, #4a3660 60%, #5a4530 100%);
      border-bottom: 3px solid #2a1d3a;
      z-index: 1;
    }
    .wall-top::after {
      content: '';
      position: absolute; bottom: 3px; left: 0; right: 0; height: 1px;
      background: rgba(255,255,255,.06);
    }

    /* Meeting room carpet */
    .carpet {
      position: absolute;
      background: #3a2850;
      border: 2px solid #4a3568;
      border-radius: 4px;
      box-shadow: inset 0 0 20px rgba(0,0,0,.2);
    }
    .carpet-label {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; color: #6a5890; white-space: nowrap;
      text-transform: uppercase; letter-spacing: 1px;
      pointer-events: none;
    }

    /* Meeting table */
    .mtable {
      position: absolute;
      background: linear-gradient(135deg, #5c4a78, #4a3860);
      border: 2px solid #6a5890;
      border-radius: 50%;
      box-shadow: 0 4px 0 #3a2848, 0 6px 12px rgba(0,0,0,.4);
    }

    /* Furniture SVGs */
    .furniture {
      position: absolute;
      image-rendering: pixelated;
      pointer-events: none;
    }

    /* ═══ Characters ═══ */
    .char {
      position: absolute;
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer; z-index: 10;
      transition: left .9s cubic-bezier(.4,0,.2,1), top .9s cubic-bezier(.4,0,.2,1);
      user-select: none;
    }
    .char:hover { filter: brightness(1.15); }
    .char-sprite {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transition: filter .2s;
      filter: drop-shadow(0 3px 4px rgba(0,0,0,.5));
    }
    .char-label {
      margin-top: 2px;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; color: #fff;
      background: rgba(0,0,0,.7);
      padding: 2px 5px; border-radius: 2px;
      white-space: nowrap;
      text-shadow: 1px 1px 0 #000;
    }

    /* Animations */
    .char.idle .char-sprite { animation: ch-idle 2.8s ease-in-out infinite; }
    .char.working .char-sprite { animation: ch-work .5s ease-in-out infinite; }
    .char.done .char-sprite { animation: ch-done .4s ease-in-out 4; }
    .char.walking .char-sprite { animation: ch-walk .3s ease-in-out infinite; }

    @keyframes ch-idle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    @keyframes ch-work { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-4deg) translateY(-2px)} 75%{transform:rotate(4deg) translateY(-2px)} }
    @keyframes ch-done { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2) translateY(-4px)} }
    @keyframes ch-walk { 0%,100%{transform:translateX(0)} 50%{transform:translateX(2px)} }

    /* Status dot */
    .char-dot {
      position: absolute; top: 0; right: -2px;
      width: 8px; height: 8px; border-radius: 2px;
      border: 2px solid #3a2d55; z-index: 11;
    }
    .char-dot.idle { background: var(--text-muted); }
    .char-dot.working { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: blink .7s infinite; }
    .char-dot.done { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .char-dot.error { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Speech bubble */
    .bubble {
      position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%);
      background: #fff; color: #1a1a2e;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; font-weight: 400;
      padding: 4px 7px; border-radius: 3px;
      white-space: nowrap;
      animation: bub-in .15s ease-out;
      z-index: 25; pointer-events: none;
      box-shadow: 0 2px 0 rgba(0,0,0,.3);
    }
    .bubble::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 4px solid transparent; border-top-color: #fff;
    }
    @keyframes bub-in { from{opacity:0;transform:translateX(-50%) translateY(3px) scale(.8)} to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)} }

    /* Particles */
    .wpart {
      position: absolute; font-size: 10px; pointer-events: none; z-index: 30;
      animation: pfloat 1.2s ease-out forwards;
    }
    @keyframes pfloat {
      0%{opacity:1;transform:translate(0,0) scale(1)}
      100%{opacity:0;transform:translate(var(--px),var(--py)) scale(.3)}
    }

    /* Selection ring */
    .char.selected .char-sprite {
      filter: drop-shadow(0 0 8px rgba(124,111,247,.8)) drop-shadow(0 3px 4px rgba(0,0,0,.5));
    }

    /* ═══ Chat Panel ═══ */
    .chat-panel {
      position: absolute; right: 0; top: 0; bottom: 0; width: 300px;
      background: var(--surface);
      border-left: 2px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      z-index: 40;
      box-shadow: -6px 0 24px rgba(0,0,0,.5);
    }
    .chat-panel.open { transform: translateX(0); }
    .ch-hdr {
      padding: 12px 14px; border-bottom: 2px solid var(--border);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .ch-av {
      width: 36px; height: 36px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; image-rendering: pixelated;
    }
    .ch-info { flex: 1; }
    .ch-name { font-family: 'Press Start 2P', monospace; font-size: 8px; }
    .ch-role { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .btn-x {
      width: 24px; height: 24px; border: none;
      background: var(--surface2); border-radius: 3px;
      color: var(--text-muted); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-x:hover { color: var(--text); }
    .ch-msgs { flex: 1; overflow-y: auto; padding: 10px; }
    .ch-msgs::-webkit-scrollbar { width: 3px; }
    .ch-msgs::-webkit-scrollbar-thumb { background: var(--border); }
    .cm { margin-bottom: 8px; animation: fin .2s ease-out; }
    .cm.user .mb { background: var(--accent); color: #fff; margin-left: 24px; }
    .cm.agent .mb { background: var(--surface2); border: 1px solid var(--border); margin-right: 24px; }
    .ms { font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--text-muted); margin-bottom: 3px; }
    .mb { border-radius: 6px; padding: 8px 10px; font-size: 12px; line-height: 1.5; word-break: break-word; }
    .typi {
      display: flex; gap: 3px; padding: 8px 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; width: fit-content; margin-bottom: 8px; margin-right: 24px;
    }
    .td { width: 5px; height: 5px; border-radius: 2px; background: var(--text-muted); animation: typ 1.2s ease-in-out infinite; }
    .td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
    @keyframes typ { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-4px);opacity:1} }
    .ch-input-row { padding: 10px; border-top: 2px solid var(--border); display: flex; gap: 5px; }
    .ch-input {
      flex: 1; background: var(--surface2); border: 2px solid var(--border);
      border-radius: 4px; padding: 7px 9px;
      color: var(--text); font-size: 12px; font-family: inherit; outline: none;
    }
    .ch-input:focus { border-color: var(--accent); }
    .ch-input::placeholder { color: var(--text-muted); }
    .btn-snd {
      padding: 7px 11px; background: var(--accent); color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
      box-shadow: 0 2px 0 #4a3d80;
    }
    .btn-snd:active { transform: translateY(2px); box-shadow: none; }
    .btn-snd:disabled { opacity: .5; cursor: default; }

    /* Modal */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:100; align-items:center; justify-content:center; }
    .modal-bg.open { display: flex; }
    .modal { background:var(--surface); border:2px solid var(--border); border-radius:6px; padding:20px; width:360px; max-width:92vw; }
    .modal h3 { font-family:'Press Start 2P',monospace; font-size:9px; margin-bottom:14px; }
    .modal-in { width:100%; background:var(--surface2); border:2px solid var(--border); border-radius:4px; padding:9px 12px; color:var(--text); font-size:13px; font-family:inherit; outline:none; margin-bottom:10px; }
    .modal-in:focus { border-color: var(--accent); }
    .modal-acts { display:flex; gap:6px; justify-content:flex-end; }

    /* Responsive */
    @media (max-width: 1100px) {
      .office { width: 600px; height: 420px; }
    }

    /* ═══ Vault Graph Overlay ═══ */
    #vaultGraphOverlay {
      position: fixed; inset: 0; z-index: 100;
      background: #06030f;
      display: none; flex-direction: column;
    }
    #vaultGraphOverlay.open { display: flex; }
    .vg-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; background: rgba(10,5,20,.9);
      border-bottom: 1px solid #2a1d4a; flex-shrink: 0; gap: 10px;
    }
    .vg-title { font-family: 'Press Start 2P', monospace; font-size: 9px; color: #c084fc; white-space: nowrap; }
    .vg-filters { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }
    .vg-f {
      padding: 3px 8px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.06);
      color: #aaa; font-size: 9px; cursor: pointer; transition: all .15s;
      font-family: inherit;
    }
    .vg-f.active { background: rgba(124,111,247,.2); color: #fff; }
    .vg-f:not(.active) { opacity: .45; }
    .vg-body { display: flex; flex: 1; overflow: hidden; }
    #graphCanvas { flex: 1; }
    #notePanel {
      width: 0; overflow: hidden; transition: width .25s ease;
      background: rgba(12,6,26,.97); border-left: 1px solid #2a1d4a;
      display: flex; flex-direction: column; position: relative;
    }
    #notePanel.open { width: 340px; }
    .np-head { padding: 12px 14px 10px; border-bottom: 1px solid #2a1d4a; flex-shrink: 0; }
    .np-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .np-meta { font-size: 10px; color: var(--text-muted); display: flex; gap: 6px; flex-wrap: wrap; }
    .np-tag { padding: 2px 6px; border-radius: 3px; background: rgba(255,255,255,.08); }
    .np-body { flex: 1; overflow-y: auto; padding: 12px 14px; font-size: 12px; line-height: 1.65; color: var(--text); }
    .np-body h1,.np-body h2,.np-body h3 { font-size: 12px; color: var(--accent); margin: 10px 0 4px; }
    .np-body p { margin-bottom: 6px; }
    .np-body ul,.np-body ol { padding-left: 16px; margin-bottom: 6px; }
    .np-body code { background: rgba(255,255,255,.1); padding: 1px 4px; border-radius: 2px; font-size: 10px; }
    .np-body pre { background: rgba(255,255,255,.06); padding: 8px; border-radius: 4px; overflow-x: auto; }
    .np-body blockquote { border-left: 3px solid var(--accent); padding-left: 8px; color: var(--text-muted); }
    .np-close { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; line-height: 1; }
    .np-close:hover { color: var(--text); }

    /* ═══ Agent Controls ═══ */
    .ac-row { display:flex; align-items:center; gap:6px; padding:5px 0; border-bottom:1px solid rgba(58,45,85,.35); }
    .ac-row:last-child { border-bottom:none; }
    .ac-info { flex:1; min-width:0; overflow:hidden; }
    .ac-name { font-size:10px; font-weight:600; color:var(--text); }
    .ac-role { font-size:8px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ac-toggle {
      width:26px; height:15px; border-radius:8px; border:none; cursor:pointer;
      position:relative; flex-shrink:0; transition:background .2s;
    }
    .ac-toggle.on { background:#4ade80; }
    .ac-toggle.off { background:#4a3d55; }
    .ac-toggle::after {
      content:''; position:absolute; width:11px; height:11px;
      border-radius:50%; background:#fff; top:2px; transition:left .2s;
      box-shadow:0 1px 2px rgba(0,0,0,.3);
    }
    .ac-toggle.on::after { left:13px; }
    .ac-toggle.off::after { left:2px; }

    /* ═══ Phaser canvas ═══ */
    #office canvas { display: block; }
    .btn-neural { background: linear-gradient(135deg,#2a1060,#1a0840); border: 1px solid #7c6ff7; color: #c084fc; font-size: 8px; padding: 3px 7px; float: right; margin-top: -2px; }
    .btn-neural:hover { background: rgba(124,111,247,.3); color: #e0d4ff; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-px">🏢</div>
    <span class="logo-text">DATTU OFFICE</span>
  </div>
  <div class="hdr-right">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLbl">Conectando...</span>
    <span style="color:var(--border)">|</span>
    <span id="activeStatus">--</span>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sb-sec">
      <div class="sb-label">Nova Tarefa</div>
      <textarea id="taskIn" class="task-ta" placeholder="Descreva a tarefa..."></textarea>
      <div class="task-row">
        <select id="priSel" class="sel">
          <option value="low">Baixa</option>
          <option value="medium" selected>Média</option>
          <option value="high">Alta</option>
          <option value="urgent">Urgente</option>
        </select>
        <button class="btn btn-pri" id="btnExec" onclick="sendTask()">▶ GO</button>
        <button class="btn btn-sec" onclick="openModal()" title="Reunião">🤝</button>
      </div>
      <div class="qb-row">
        <button class="qb" onclick="qt('Contratar dev fullstack sênior')">+Contratar</button>
        <button class="qb" onclick="qt('Campanha de marketing do produto')">+Campanha</button>
        <button class="qb" onclick="qt('Decisão sobre arquitetura')">+Decisão</button>
        <button class="qb" onclick="qt('Pauta para reunião de planejamento')">+Pauta</button>
      </div>
      <div class="prog"><div class="prog-fill" id="progFill"></div></div>
    </div>
    <div class="sb-sec">
      <div class="sb-label">Vault <button class="btn btn-neural" onclick="openVaultGraph()">🧠 Rede Neural</button></div>
      <div class="vault-row" id="vaultRow"></div>
    </div>

function spriteToSVG(rows, pal, scale) {
  const h = rows.length, w = Math.max(...rows.map(r => r.length));
  let rects = '';
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < rows[y].length; x++) {
      const c = rows[y][x];
      if (c === '.' || c === ' ') continue;
      const fill = pal[c];
      if (fill) rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="${fill}"/>`;
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w*scale}" height="${h*scale}" style="image-rendering:pixelated;image-rendering:crisp-edges;">${rects}</svg>`;
}

class AgentSprite {
  constructor(scene, role, meta, homeX, homeY) {
    this.scene = scene; this.role = role; this.meta = meta;
    this.homeX = homeX; this.homeY = homeY;
    this.state = 'idle'; this.bubble = null; this.bubbleTimer = null;
    this.idleTween = null; this.workTween = null;

    const color = parseInt(meta.color.replace('#',''), 16);
    this.color = color;

    this.ctr = scene.add.container(homeX, homeY);

    // Shadow
    this.shadow = scene.add.ellipse(1, 30, 22, 7, 0x000000, 0.25);

    // Glow ring (shown when working/selected)
    this.ring = scene.add.circle(0, -2, 16, color, 0.12);

    // Body
    this.body = scene.add.graphics();
    this._drawBody(color);

    // Head
    this.head = scene.add.circle(0, -18, 9, 0xf5cba7);
    this.head.setStrokeStyle(1, 0xd4a574, 1);

    // Eyes
    this.eyeL = scene.add.rectangle(-3, -19, 3, 3, 0x1a1025);
    this.eyeR = scene.add.rectangle(3,  -19, 3, 3, 0x1a1025);

    // Name
    this.lbl = scene.add.text(0, 12, meta.name, {
      fontSize: '6px', color: '#e8e0f0',
      fontFamily: "'Press Start 2P', monospace",
    }).setOrigin(0.5, 0);

    // Status dot
    this.dot = scene.add.circle(11, -24, 5, 0x4ade80);
    this.dot.setStrokeStyle(1.5, 0x0d0816, 1);

    this.ctr.add([this.shadow, this.ring, this.body, this.head, this.eyeL, this.eyeR, this.lbl, this.dot]);
    this.ctr.setSize(34, 56).setInteractive({ cursor: 'pointer' });
    this.ctr.on('pointerover', () => scene.tweens.add({ targets: this.ctr, scaleX: 1.1, scaleY: 1.1, duration: 100 }));
    this.ctr.on('pointerout',  () => scene.tweens.add({ targets: this.ctr, scaleX: 1,   scaleY: 1,   duration: 100 }));
    this.ctr.on('pointerdown', () => window.openChat(role));

    // Idle bob
    this._startIdleBob();
  }

  _drawBody(color) {
    this.body.clear();
    this.body.fillStyle(color, 1);
    this.body.fillRoundedRect(-10, -9, 20, 22, 5);
    this.body.fillStyle(0x000000, 0.2);
    this.body.fillRoundedRect(-7, -4, 14, 7, 2);
  }

  _startIdleBob() {
    this.idleTween = this.scene.tweens.add({
      targets: this.ctr, y: this.homeY - 2,
      yoyo: true, repeat: -1,
      duration: 800 + Math.random() * 400, ease: 'Sine.easeInOut',
    });
  }

  setState(status) {
    this.state = status;
    const dotC = { idle:0x4ade80, working:0xfbbf24, done:0x4ade80, error:0xf87171, meeting:0x60a5fa };
    this.dot.setFillStyle(dotC[status] || 0x4ade80);
    if (this.workTween) { this.workTween.stop(); this.workTween = null; }
    this.ring.setAlpha(0.12);

    if (status === 'working') {
      this.idleTween?.stop();
      const dp = LAYOUT.desks[this.role];
      this.scene.tweens.add({ targets: this.ctr, x: dp.x + 32, y: dp.y, duration: 650, ease: 'Cubic.easeInOut' });
      this.workTween = this.scene.tweens.add({ targets: this.ring, alpha: 0.45, yoyo: true, repeat: -1, duration: 380 });
    } else if (status === 'idle' || status === 'done') {
      this.scene.tweens.add({
        targets: this.ctr, x: this.homeX, y: this.homeY,
        duration: 800, ease: 'Cubic.easeInOut',
        delay: status === 'done' ? 400 : 0,
        onComplete: () => this._startIdleBob(),
      });
    } else if (status === 'error') {
      this.idleTween?.stop();
      this.scene.tweens.add({
        targets: this.ctr, x: this.ctr.x + 6, yoyo: true, repeat: 3, duration: 55,
        onComplete: () => this._startIdleBob(),
      });
    }
  }

  moveToMeeting(x, y) {
    this.idleTween?.stop(); this.state = 'meeting';
    this.dot.setFillStyle(0x60a5fa);
    this.scene.tweens.add({ targets: this.ctr, x, y, duration: 900, ease: 'Cubic.easeInOut' });
  }

  setSelected(sel) {
    this.scene.tweens.add({ targets: this.ring, alpha: sel ? 0.55 : 0.12, duration: 180 });
  }

  showBubble(text, dur) {
    if (this.bubble) { this.bubble.destroy(); this.bubble = null; }
    if (this.bubbleTimer) clearTimeout(this.bubbleTimer);
    const w = Math.max(60, text.length * 7 + 16);
    const bg = this.scene.add.rectangle(0, -48, w, 20, 0xffffff, 0.93);
    bg.setStrokeStyle(1, 0x7c6ff7, 1);
    const txt = this.scene.add.text(0, -48, text, { fontSize: '7px', color: '#1a1025', fontFamily: 'sans-serif' }).setOrigin(0.5, 0.5);
    this.bubble = this.scene.add.container(0, 0, [bg, txt]);
    this.ctr.add(this.bubble);
    if (dur > 0) this.bubbleTimer = setTimeout(() => { if (this.bubble) { this.bubble.destroy(); this.bubble = null; } }, dur);
  }

  spawnParticles() {
    const icons = ['⚡','✨','💡','⚙️'];
    for (let i = 0; i < 4; i++) {
      setTimeout(() => {
        if (!this.scene?.sys.isActive()) return;
        const px = this.ctr.x + (Math.random() - 0.5) * 24;
        const py = this.ctr.y - 12;
        const p = this.scene.add.text(px, py, icons[Math.floor(Math.random()*icons.length)], { fontSize: '13px' }).setOrigin(0.5);
        this.scene.tweens.add({ targets: p, y: py - 44, alpha: 0, duration: 900, ease: 'Quad.easeOut', onComplete: () => p.destroy() });
      }, i * 220);
    }
  }
}

class OfficeScene extends Phaser.Scene {
  constructor() { super({ key: 'OfficeScene' }); }

  create() {
    const W = 820, H = 560;
    const g = this.add.graphics();

    // Floor
    g.fillStyle(0x5a4530, 1); g.fillRect(0, 32, W, H);
    g.lineStyle(1, 0x4a3520, 0.55);
    for (let x = 0; x <= W; x += 40) g.lineBetween(x, 32, x, H);
    for (let y = 32; y <= H; y += 40) g.lineBetween(0, y, W, y);
    g.lineStyle(1, 0x6a5540, 0.25);
    for (let y = 48; y <= H; y += 40) g.lineBetween(0, y, W, y);

    // Wall
    g.fillGradientStyle(0x3d2d52, 0x3d2d52, 0x4a3660, 0x4a3660, 1);
    g.fillRect(0, 0, W, 32);
    g.lineStyle(3, 0x2a1d3a, 1); g.lineBetween(0, 32, W, 32);
    g.lineStyle(1, 0x6a4a80, 0.35); g.lineBetween(0, 28, W, 28);

    // Meeting room carpet
    const mr = LAYOUT.meetingRoom;
    g.fillStyle(0x2d1a4a, 1); g.fillRoundedRect(mr.x, mr.y, mr.w, mr.h, 6);
    g.lineStyle(2, 0x7c6ff7, 0.5); g.strokeRoundedRect(mr.x, mr.y, mr.w, mr.h, 6);
    g.lineStyle(1, 0x9d8fff, 0.18); g.strokeRoundedRect(mr.x+6, mr.y+6, mr.w-12, mr.h-12, 4);
    this.add.text(mr.x + mr.w/2, mr.y + 12, 'Sala de Reuniões', {
      fontSize: '7px', color: '#9d8fff', fontFamily: "'Press Start 2P', monospace"
    }).setOrigin(0.5);

    // Meeting table
    const mt = LAYOUT.meetingTable;
    g.fillStyle(0x3d2560, 1); g.fillRoundedRect(mt.x, mt.y, mt.w, mt.h, 8);
    g.lineStyle(2, 0x9d7ccc, 0.6); g.strokeRoundedRect(mt.x, mt.y, mt.w, mt.h, 8);
    g.fillStyle(0xffffff, 0.04); g.fillRoundedRect(mt.x+6, mt.y+4, mt.w-12, 10, 4);

    // Meeting chairs
    LAYOUT.meetingSpots.forEach(sp => {
      g.fillStyle(0x4a2d6e, 1); g.fillRoundedRect(sp.x-9, sp.y-7, 18, 14, 3);
      g.lineStyle(1, 0x7c4faa, 0.5); g.strokeRoundedRect(sp.x-9, sp.y-7, 18, 14, 3);
    });

    // Desks
    for (const [role, dp] of Object.entries(LAYOUT.desks)) {
      const dc = parseInt(AG[role].color.replace('#',''), 16);
      g.fillStyle(0x7a5c38, 1); g.fillRoundedRect(dp.x, dp.y, 80, 45, 3);
      g.lineStyle(2, 0x9a7c52, 0.6); g.strokeRoundedRect(dp.x, dp.y, 80, 45, 3);
      g.fillStyle(0xffffff, 0.05); g.fillRoundedRect(dp.x+3, dp.y+3, 74, 8, 2);
      // Monitor
      g.fillStyle(0x252535, 1); g.fillRoundedRect(dp.x+20, dp.y-18, 40, 26, 3);
      g.fillStyle(dc, 0.14); g.fillRect(dp.x+23, dp.y-15, 34, 18);
      g.lineStyle(1, dc, 0.45); g.strokeRect(dp.x+23, dp.y-15, 34, 18);
      g.fillStyle(0x1a1a28, 1); g.fillRect(dp.x+37, dp.y+7, 6, 4); g.fillRect(dp.x+32, dp.y+11, 16, 3);
      // Label under desk
      this.add.text(dp.x + 40, dp.y + 48, AG[role].label, {
        fontSize: '5px', color: '#8b7860', fontFamily: "'Press Start 2P', monospace"
      }).setOrigin(0.5, 0);
    }

    // Plants
    LAYOUT.plants.forEach(p => {
      g.fillStyle(0x166534, 1); g.fillRoundedRect(p.x+4, p.y+10, 16, 20, 3);
      g.fillStyle(0x15803d, 1);
      [[12,5,9],[12,0,7],[12,-4,5]].forEach(([cx,cy,r]) => g.fillCircle(p.x+cx, p.y+cy, r));
      g.fillStyle(0x22c55e, 0.4); g.fillCircle(p.x+10, p.y-1, 4);
    });

    // Whiteboard
    const wb = LAYOUT.whiteboard;
    g.fillStyle(0xf0ede8, 1); g.fillRoundedRect(wb.x, wb.y, 72, 30, 2);
    g.lineStyle(2, 0x2a1d3a, 1); g.strokeRoundedRect(wb.x, wb.y, 72, 30, 2);
    g.lineStyle(1, 0xc084fc, 0.6);
    [[wb.x+8,wb.y+10],[wb.x+20,wb.y+18],[wb.x+36,wb.y+12],[wb.x+52,wb.y+20]].forEach(([x,y],i,a) => { if(i>0) g.lineBetween(a[i-1][0],a[i-1][1],x,y); });

    // Agent sprites
    for (const [role, meta] of Object.entries(AG)) {
      const chp = LAYOUT.chars[role];
      const sp = new AgentSprite(this, role, meta, chp.x + 12, chp.y + 8);
      window.agentSprites[role] = sp;
      states[role] = { status: 'idle', sp };
    }
  }
}

function renderOffice() {
  if (typeof Phaser === 'undefined') { setTimeout(renderOffice, 150); return; }
  const container = document.getElementById('office');
  container.innerHTML = '';
  phaserGame = new Phaser.Game({
    type: Phaser.AUTO,
    width: 820, height: 560,
    backgroundColor: '#0d0816',
    parent: 'office',
    scene: OfficeScene,
    scale: { mode: Phaser.Scale.NONE },
  });
}

// ═══ Character State ═══
function setCS(role, status) {
  const sp = window.agentSprites[role];
  if (sp) sp.setState(status);
  if (states[role]) states[role].status = status;
  updateActive();
}

function updateActive() {
  const w = Object.values(states).filter(s => s && s.status === 'working').length;
  document.getElementById('activeStatus').textContent = w > 0 ? w + ' trabalhando' : 'Todos livres';
}

// ═══ Bubbles ═══
function showBub(role, text, dur) {
  const sp = window.agentSprites[role]; if (sp) sp.showBubble(text, dur);
}

// ═══ Particles ═══
function spawnP(role) {
  const sp = window.agentSprites[role]; if (sp) sp.spawnParticles();
}

// ═══ Chat ═══
function openChat(role) {
  const m = AG[role]; if (!m) return;
  if (selAgent && window.agentSprites[selAgent]) window.agentSprites[selAgent].setSelected(false);
  selAgent = role;
  if (window.agentSprites[role]) window.agentSprites[role].setSelected(true);

  document.getElementById('chAv').style.cssText = `background:${m.color}22;border:2px solid ${m.color}66;font-size:18px;`;
  document.getElementById('chAv').textContent = m.emoji;
  document.getElementById('chName').textContent = m.name;
  document.getElementById('chRole').textContent = m.role;

  const msgs = document.getElementById('chMsgs');
  msgs.innerHTML = `<div style="text-align:center;padding:16px;font-size:10px;color:var(--text-muted);">
    ${m.emoji} Conversando com <strong style="color:var(--text)">${m.name}</strong>
  </div>`;

  document.getElementById('chatPanel').classList.add('open');
  document.getElementById('chInput').focus();
}

function closeChat() {
  document.getElementById('chatPanel').classList.remove('open');
  if (selAgent && window.agentSprites[selAgent]) window.agentSprites[selAgent].setSelected(false);
  selAgent = null;
}

function sendChat() {
  const inp = document.getElementById('chInput');
  const msg = inp.value.trim();
  if (!msg || !selAgent) return;
  addCM('user','Você',msg);
  inp.value = ''; inp.disabled = true;
  document.getElementById('btnSnd').disabled = true;
  socket.emit('chat:message', { role:selAgent, message:msg, sessionId:socket.id });
}

function addCM(type, sender, text) {
  const msgs = document.getElementById('chMsgs');
  const m = type==='agent' ? AG[sender] : null;
  const d = document.createElement('div');
  d.className = `cm ${type}`;
  d.innerHTML = `
    <div class="ms">${type==='agent' ? (m?.emoji||'')+' '+m?.name : sender}</div>
    <div class="mb">${esc(text)}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyp() {
  const msgs = document.getElementById('chMsgs');
  if (document.getElementById('typI')) return;
  const d = document.createElement('div'); d.id='typI'; d.className='typi';
  d.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function hideTyp() { const e = document.getElementById('typI'); if(e) e.remove(); }
function enCI() {
  document.getElementById('chInput').disabled = false;
  document.getElementById('btnSnd').disabled = false;
  document.getElementById('chInput').focus();
}

// ═══ Tasks ═══
function sendTask() {
  const inp = document.getElementById('taskIn');
  const t = inp.value.trim();
  if (!t || processing) return;
  socket.emit('task:submit', { task:t, priority:document.getElementById('priSel').value });
  inp.value = ''; inp.style.height = 'auto';
}
function qt(t) { document.getElementById('taskIn').value = t; sendTask(); }
function setProc(p) {
  processing = p;
  const b = document.getElementById('btnExec');
  const f = document.getElementById('progFill');
  b.disabled = p; b.textContent = p ? '⏳ ...' : '▶ GO';
  f.style.width = p ? '100%' : '0%';
  f.style.transition = p ? 'width 28s linear' : 'width .3s';
}

// ═══ Meeting ═══
function openModal() { document.getElementById('modalBg').classList.add('open'); document.getElementById('meetTopic').focus(); }
function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
function startMeeting() {
  const t = document.getElementById('meetTopic').value.trim();
  if (!t) return;
  socket.emit('meeting:start', { topic:t });
  closeModal();
  document.getElementById('meetTopic').value = '';
  addFeed('working','🤝 Reunião: '+t);
  ['po','ceo','tech-lead'].forEach((r,i) => {
    const sp = window.agentSprites[r];
    if (!sp) return;
    const spot = LAYOUT.meetingSpots[i];
    setTimeout(() => {
      sp.moveToMeeting(spot.x, spot.y);
      setTimeout(() => showBub(r,'Em reunião', 0), 900);
    }, i * 280);
  });
}

// ═══ Feed ═══
function addFeed(lvl, msg) {
  const f = document.getElementById('feed');
  const e = document.getElementById('feedEmpty'); if(e) e.remove();
  const t = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const d = document.createElement('div'); d.className='fi';
  d.innerHTML = `<div class="fd ${lvl}"></div><div><div class="ft">${esc(msg)}</div><div class="ftm">${t}</div></div>`;
  f.appendChild(d); f.scrollTop = f.scrollHeight;
  while (f.children.length > 50) f.removeChild(f.firstChild);
}

// ═══ Vault ═══
function renderVault(stats) {
  const r = document.getElementById('vaultRow'); r.innerHTML = '';
  for (const [k,v] of Object.entries(stats)) {
    const m = VAULT_META[k]||{e:'📁',l:k};
    const c = document.createElement('div'); c.className='vc';
    c.innerHTML = `<b>${v}</b>${m.e} ${m.l}`;
    c.onclick = () => loadVF(k);
    r.appendChild(c);
  }
}
async function loadVF(folder) {
  const m = VAULT_META[folder]||{e:'📁',l:folder};
  try {
    const res = await fetch(`/api/vault/notes/${folder}`);
    const notes = await res.json();
    addFeed('note',`${m.e} ${m.l}: ${notes.length} nota(s)`);
    notes.slice(0,3).forEach(n=>addFeed('info','📄 '+n.filename.replace('.md','')));
  } catch(e) { addFeed('error','Erro ao carregar'); }
}

// ═══ Conn ═══
function setCon(c) {
  document.getElementById('connDot').style.background = c?'var(--green)':'var(--red)';
  document.getElementById('connDot').style.boxShadow = c?'0 0 6px var(--green)':'0 0 6px var(--red)';
  document.getElementById('connLbl').textContent = c?'Online':'Offline';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══ Init ═══
document.addEventListener('DOMContentLoaded', () => {
  renderOffice();
  renderAgentControls();
  fetch('/api/vault/stats').then(r=>r.json()).then(renderVault).catch(()=>{});

  document.getElementById('taskIn').addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendTask(); }
  });
  document.getElementById('taskIn').addEventListener('input', function() {
    this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px';
  });
  document.getElementById('meetTopic').addEventListener('keydown', e => { if(e.key==='Enter') startMeeting(); });
  document.addEventListener('keydown', e => { if(e.key==='Escape'){closeModal();closeChat();closeVaultGraph();} });
});

// ═══ Agent Controls ═══
function renderAgentControls() {
  const c = document.getElementById('agentControls'); if (!c) return;
  c.innerHTML = '';
  for (const [role, meta] of Object.entries(AG)) {
    const row = document.createElement('div'); row.className = 'ac-row';

async function toggleAgent(role) {
  const btn = document.getElementById(`tog-${role}`);
  if (!btn) return;
  const isOn = btn.classList.contains('on');
  try {
    await fetch(`/api/agents/${role}/${isOn ? 'deactivate' : 'activate'}`, { method: 'POST' });
    // UI update handled by socket event
  } catch(e) { addFeed('error','Erro ao alterar agente'); }
}

// ═══ Vault Neural Network ═══
const GRAPH_COLORS = {
  Backlog:'#60a5fa', Decisoes:'#c084fc', Analises:'#34d399', Sprints:'#f472b6',
  Design:'#fb923c', Reviews:'#fbbf24', Arquitetura:'#818cf8', Deploy:'#f87171', _sistema:'#94a3b8'
};
let vgGraph = null, vgData = null, vgScriptsLoaded = false;
const vgActive = new Set(Object.keys(GRAPH_COLORS));

function openVaultGraph() { document.getElementById('vaultGraphOverlay').classList.add('open'); initGraph(); }
function closeVaultGraph() { document.getElementById('vaultGraphOverlay').classList.remove('open'); }
function closeNotePanel() { document.getElementById('notePanel').classList.remove('open'); }

function initGraph() {
  if (vgScriptsLoaded) { refreshGraph(); return; }
  const s1 = document.createElement('script');
  s1.src = 'https://unpkg.com/force-graph/dist/force-graph.min.js';
  s1.onload = () => {
    const s2 = document.createElement('script');
    s2.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
    s2.onload = () => { vgScriptsLoaded = true; refreshGraph(); };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

async function refreshGraph() {
  try {
    const res = await fetch('/api/vault/graph');
    vgData = await res.json();
    renderGraph();
    renderGraphFilters();
  } catch(e) { addFeed('error','Erro ao carregar grafo: '+e.message); }
}

function _getFiltered() {
  if (!vgData) return { nodes:[], links:[] };
  const nodes = vgData.nodes.filter(n => vgActive.has(n.group));
  const ids = new Set(nodes.map(n => n.id));
  const links = vgData.links.filter(l => {
    const s = typeof l.source==='object' ? l.source.id : l.source;
    const t = typeof l.target==='object' ? l.target.id : l.target;
    return ids.has(s) && ids.has(t);
  });
  return { nodes, links };
}

function renderGraph() {
  if (!vgData || !window.ForceGraph) return;
  const el = document.getElementById('graphCanvas');
  if (vgGraph) { try { vgGraph._destructor?.(); } catch(e){} el.innerHTML = ''; }
  const data = _getFiltered();

  vgGraph = ForceGraph()(el)
    .graphData(data)
    .nodeId('id')
    .nodeLabel(n => `${n.label} · ${n.group}${n.agente ? ' · '+n.agente : ''}`)
    .nodeColor(n => GRAPH_COLORS[n.group] || '#94a3b8')
    .nodeVal(n => {
      const linkCount = data.links.filter(l => {
        const s = typeof l.source==='object'?l.source.id:l.source;
        const t = typeof l.target==='object'?l.target.id:l.target;
        return s===n.id || t===n.id;
      }).length;
      return 4 + linkCount * 2;
    })
    .nodeRelSize(5)
    .linkColor(() => 'rgba(124,111,247,0.22)')
    .linkWidth(1)
    .linkDirectionalArrowLength(4)
    .linkDirectionalArrowRelPos(1)
    .backgroundColor('#06030f')
    .onNodeClick(node => openNotePanel(node))
    .onBackgroundClick(() => closeNotePanel())
    .width(el.offsetWidth || 800)
    .height(el.offsetHeight || 600);
}

function renderGraphFilters() {
  const c = document.getElementById('graphFilters'); c.innerHTML = '';
  const allMeta = { ...VAULT_META, _sistema: { e:'⚙️', l:'Sistema' } };
  for (const [group, color] of Object.entries(GRAPH_COLORS)) {
    const m = allMeta[group] || { e:'📁', l:group };
    const btn = document.createElement('button');
    btn.className = 'vg-f active';
    btn.style.cssText = `border-color:${color};color:${color};`;
    btn.textContent = `${m.e} ${m.l}`;
    btn.onclick = () => {
      if (vgActive.has(group)) { vgActive.delete(group); btn.classList.remove('active'); }
      else { vgActive.add(group); btn.classList.add('active'); }
      renderGraph();
    };
    c.appendChild(btn);
  }
}

async function openNotePanel(node) {
  document.getElementById('npTitle').textContent = node.label;
  const c = GRAPH_COLORS[node.group] || '#94a3b8';
  const meta = [];
  if (node.group) meta.push(`<span class="np-tag" style="color:${c}">${node.group}</span>`);
  if (node.agente) meta.push(`<span class="np-tag">${AG[node.agente]?.emoji||''} ${node.agente}</span>`);
  if (node.status) meta.push(`<span class="np-tag">${node.status}</span>`);
  if (node.tipo) meta.push(`<span class="np-tag">${node.tipo}</span>`);
  document.getElementById('npMeta').innerHTML = meta.join('');
  document.getElementById('npBody').innerHTML = '<em style="color:var(--text-muted);font-size:11px">Carregando...</em>';
  document.getElementById('notePanel').classList.add('open');

  const preview = node.preview || '';
  try {
    const res = await fetch(`/api/vault/notes/${node.group}`);
    const notes = await res.json();
    const found = notes.find(n => n.filename === node.id + '.md');
    const content = found ? found.preview : preview;
    document.getElementById('npBody').innerHTML = window.marked ? marked.parse(content || '_sem conteúdo_') : `<pre>${content}</pre>`;
  } catch(e) {
    document.getElementById('npBody').innerHTML = window.marked ? marked.parse(preview || '_sem conteúdo_') : `<pre>${preview}</pre>`;
  }
}
</script>
