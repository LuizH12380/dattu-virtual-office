<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dattu — Escritório Virtual</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --bg: #1a1025;
      --surface: #221832;
      --surface2: #2c2042;
      --border: #3a2d55;
      --text: #e8e0f0;
      --text-muted: #8878a0;
      --accent: #7c6ff7;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --blue: #60a5fa;
      --purple: #c084fc;
      --pink: #f472b6;
      --floor1: #5c4a32;
      --floor2: #4e3e28;
      --wall-top: #3d2d4a;
      --wall-side: #2e1f3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pixel-font { font-family: 'Press Start 2P', monospace; }

    /* ═══ Header ═══ */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 46px;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      flex-shrink: 0; z-index: 20;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-px {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #7c6ff7, #c084fc);
      border-radius: 4px; image-rendering: pixelated;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      box-shadow: 0 2px 0 #4a3d80;
    }
    .logo-text { font-family: 'Press Start 2P', monospace; font-size: 11px; color: var(--text); }
    .hdr-right { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-muted); }
    .conn-dot {
      width: 8px; height: 8px; border-radius: 2px;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    /* ═══ Main Layout ═══ */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ═══ Sidebar ═══ */
    .sidebar {
      width: 270px; flex-shrink: 0;
      background: var(--surface);
      border-right: 2px solid var(--border);
      display: flex; flex-direction: column;
    }
    .sb-sec { padding: 12px; border-bottom: 1px solid var(--border); }
    .sb-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted);
      margin-bottom: 8px;
    }
    .task-ta {
      width: 100%; background: var(--surface2);
      border: 2px solid var(--border); border-radius: 4px;
      padding: 8px 10px; color: var(--text);
      font-size: 12px; font-family: inherit;
      resize: none; min-height: 60px; outline: none;
    }
    .task-ta:focus { border-color: var(--accent); }
    .task-ta::placeholder { color: var(--text-muted); }
    .task-row { display: flex; gap: 5px; margin-top: 6px; align-items: center; }
    .sel {
      background: var(--surface2); border: 2px solid var(--border);
      color: var(--text); border-radius: 4px; padding: 5px 6px;
      font-size: 11px; font-family: inherit; outline: none;
    }
    .btn {
      padding: 6px 12px; border-radius: 4px; border: none;
      cursor: pointer; font-size: 11px; font-weight: 700;
      font-family: inherit; transition: all .12s; white-space: nowrap;
      box-shadow: 0 2px 0 rgba(0,0,0,.3);
    }
    .btn:active { transform: translateY(2px); box-shadow: none; }
    .btn-pri { background: var(--accent); color: #fff; }
    .btn-pri:hover { background: #6a5de0; }
    .btn-pri:disabled { opacity: .5; cursor: default; }
    .btn-sec { background: var(--surface2); color: var(--text); border: 2px solid var(--border); }
    .btn-sec:hover { border-color: var(--accent); }
    .qb-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .qb {
      padding: 3px 7px; border-radius: 3px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: 9px;
      cursor: pointer; font-family: inherit;
    }
    .qb:hover { border-color: var(--accent); color: var(--accent); }
    .prog { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .prog-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--purple)); transition: width .3s; }

    /* Vault */
    .vault-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .vc {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; padding: 4px 6px; font-size: 10px;
      cursor: pointer; display: flex; align-items: center; gap: 3px;
    }
    .vc:hover { border-color: var(--accent); }
    .vc b { color: var(--accent); }

    /* Feed */
    .feed-lbl {
      padding: 8px 12px 2px;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px; text-transform: uppercase;
      color: var(--text-muted);
    }
    .feed { flex: 1; overflow-y: auto; padding: 6px 12px; }
    .feed::-webkit-scrollbar { width: 3px; }
    .feed::-webkit-scrollbar-thumb { background: var(--border); }
    .fi { display: flex; gap: 6px; margin-bottom: 5px; animation: fin .2s ease-out; }
    @keyframes fin { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }
    .fd { width: 6px; height: 6px; border-radius: 2px; flex-shrink: 0; margin-top: 4px; }
    .fd.info{background:var(--blue)} .fd.success{background:var(--green)}
    .fd.error{background:var(--red)} .fd.working{background:var(--yellow)}
    .fd.note{background:var(--purple)}
    .ft { font-size: 11px; line-height: 1.35; }
    .ftm { font-size: 9px; color: var(--text-muted); }

    /* ═══ Office ═══ */
    .office-wrap {
      flex: 1; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: #0d0816;
    }

    .office {
      position: relative;
      width: 820px; height: 560px;
      border: 4px solid var(--wall-side);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,.5), inset 0 0 80px rgba(0,0,0,.3);
      image-rendering: pixelated;
    }

    /* Floor */
    .office-floor {
      position: absolute; inset: 0;
      background-color: #5a4530;
      background-image:
        repeating-linear-gradient(90deg,
          #5a4530 0px, #5a4530 39px,
          #4e3a26 39px, #4e3a26 40px
        ),
        repeating-linear-gradient(0deg,
          transparent 0px, transparent 39px,
          rgba(0,0,0,.08) 39px, rgba(0,0,0,.08) 40px
        );
      background-size: 40px 40px;
    }

    /* Walls */
    .wall-top {
      position: absolute; top: 0; left: 0; right: 0; height: 32px;
      background: linear-gradient(180deg, #3d2d52 0%, #4a3660 60%, #5a4530 100%);
      border-bottom: 3px solid #2a1d3a;
      z-index: 1;
    }
    .wall-top::after {
      content: '';
      position: absolute; bottom: 3px; left: 0; right: 0; height: 1px;
      background: rgba(255,255,255,.06);
    }

    /* Meeting room carpet */
    .carpet {
      position: absolute;
      background: #3a2850;
      border: 2px solid #4a3568;
      border-radius: 4px;
      box-shadow: inset 0 0 20px rgba(0,0,0,.2);
    }
    .carpet-label {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; color: #6a5890; white-space: nowrap;
      text-transform: uppercase; letter-spacing: 1px;
      pointer-events: none;
    }

    /* Meeting table */
    .mtable {
      position: absolute;
      background: linear-gradient(135deg, #5c4a78, #4a3860);
      border: 2px solid #6a5890;
      border-radius: 50%;
      box-shadow: 0 4px 0 #3a2848, 0 6px 12px rgba(0,0,0,.4);
    }

    /* Furniture SVGs */
    .furniture {
      position: absolute;
      image-rendering: pixelated;
      pointer-events: none;
    }

    /* ═══ Characters ═══ */
    .char {
      position: absolute;
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer; z-index: 10;
      transition: left .9s cubic-bezier(.4,0,.2,1), top .9s cubic-bezier(.4,0,.2,1);
      user-select: none;
    }
    .char:hover { filter: brightness(1.15); }
    .char-sprite {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transition: filter .2s;
      filter: drop-shadow(0 3px 4px rgba(0,0,0,.5));
    }
    .char-label {
      margin-top: 2px;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; color: #fff;
      background: rgba(0,0,0,.7);
      padding: 2px 5px; border-radius: 2px;
      white-space: nowrap;
      text-shadow: 1px 1px 0 #000;
    }

    /* Animations */
    .char.idle .char-sprite { animation: ch-idle 2.8s ease-in-out infinite; }
    .char.working .char-sprite { animation: ch-work .5s ease-in-out infinite; }
    .char.done .char-sprite { animation: ch-done .4s ease-in-out 4; }
    .char.walking .char-sprite { animation: ch-walk .3s ease-in-out infinite; }

    @keyframes ch-idle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    @keyframes ch-work { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-4deg) translateY(-2px)} 75%{transform:rotate(4deg) translateY(-2px)} }
    @keyframes ch-done { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2) translateY(-4px)} }
    @keyframes ch-walk { 0%,100%{transform:translateX(0)} 50%{transform:translateX(2px)} }

    /* Status dot */
    .char-dot {
      position: absolute; top: 0; right: -2px;
      width: 8px; height: 8px; border-radius: 2px;
      border: 2px solid #3a2d55; z-index: 11;
    }
    .char-dot.idle { background: var(--text-muted); }
    .char-dot.working { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: blink .7s infinite; }
    .char-dot.done { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .char-dot.error { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Speech bubble */
    .bubble {
      position: absolute; bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%);
      background: #fff; color: #1a1a2e;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; font-weight: 400;
      padding: 4px 7px; border-radius: 3px;
      white-space: nowrap;
      animation: bub-in .15s ease-out;
      z-index: 25; pointer-events: none;
      box-shadow: 0 2px 0 rgba(0,0,0,.3);
    }
    .bubble::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 4px solid transparent; border-top-color: #fff;
    }
    @keyframes bub-in { from{opacity:0;transform:translateX(-50%) translateY(3px) scale(.8)} to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)} }

    /* Particles */
    .wpart {
      position: absolute; font-size: 10px; pointer-events: none; z-index: 30;
      animation: pfloat 1.2s ease-out forwards;
    }
    @keyframes pfloat {
      0%{opacity:1;transform:translate(0,0) scale(1)}
      100%{opacity:0;transform:translate(var(--px),var(--py)) scale(.3)}
    }

    /* Selection ring */
    .char.selected .char-sprite {
      filter: drop-shadow(0 0 8px rgba(124,111,247,.8)) drop-shadow(0 3px 4px rgba(0,0,0,.5));
    }

    /* ═══ Chat Panel ═══ */
    .chat-panel {
      position: absolute; right: 0; top: 0; bottom: 0; width: 300px;
      background: var(--surface);
      border-left: 2px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      z-index: 40;
      box-shadow: -6px 0 24px rgba(0,0,0,.5);
    }
    .chat-panel.open { transform: translateX(0); }
    .ch-hdr {
      padding: 12px 14px; border-bottom: 2px solid var(--border);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .ch-av {
      width: 36px; height: 36px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; image-rendering: pixelated;
    }
    .ch-info { flex: 1; }
    .ch-name { font-family: 'Press Start 2P', monospace; font-size: 8px; }
    .ch-role { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .btn-x {
      width: 24px; height: 24px; border: none;
      background: var(--surface2); border-radius: 3px;
      color: var(--text-muted); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-x:hover { color: var(--text); }
    .ch-msgs { flex: 1; overflow-y: auto; padding: 10px; }
    .ch-msgs::-webkit-scrollbar { width: 3px; }
    .ch-msgs::-webkit-scrollbar-thumb { background: var(--border); }
    .cm { margin-bottom: 8px; animation: fin .2s ease-out; }
    .cm.user .mb { background: var(--accent); color: #fff; margin-left: 24px; }
    .cm.agent .mb { background: var(--surface2); border: 1px solid var(--border); margin-right: 24px; }
    .ms { font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--text-muted); margin-bottom: 3px; }
    .mb { border-radius: 6px; padding: 8px 10px; font-size: 12px; line-height: 1.5; word-break: break-word; }
    .typi {
      display: flex; gap: 3px; padding: 8px 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; width: fit-content; margin-bottom: 8px; margin-right: 24px;
    }
    .td { width: 5px; height: 5px; border-radius: 2px; background: var(--text-muted); animation: typ 1.2s ease-in-out infinite; }
    .td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
    @keyframes typ { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-4px);opacity:1} }
    .ch-input-row { padding: 10px; border-top: 2px solid var(--border); display: flex; gap: 5px; }
    .ch-input {
      flex: 1; background: var(--surface2); border: 2px solid var(--border);
      border-radius: 4px; padding: 7px 9px;
      color: var(--text); font-size: 12px; font-family: inherit; outline: none;
    }
    .ch-input:focus { border-color: var(--accent); }
    .ch-input::placeholder { color: var(--text-muted); }
    .btn-snd {
      padding: 7px 11px; background: var(--accent); color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
      box-shadow: 0 2px 0 #4a3d80;
    }
    .btn-snd:active { transform: translateY(2px); box-shadow: none; }
    .btn-snd:disabled { opacity: .5; cursor: default; }

    /* Modal */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:100; align-items:center; justify-content:center; }
    .modal-bg.open { display: flex; }
    .modal { background:var(--surface); border:2px solid var(--border); border-radius:6px; padding:20px; width:360px; max-width:92vw; }
    .modal h3 { font-family:'Press Start 2P',monospace; font-size:9px; margin-bottom:14px; }
    .modal-in { width:100%; background:var(--surface2); border:2px solid var(--border); border-radius:4px; padding:9px 12px; color:var(--text); font-size:13px; font-family:inherit; outline:none; margin-bottom:10px; }
    .modal-in:focus { border-color: var(--accent); }
    .modal-acts { display:flex; gap:6px; justify-content:flex-end; }

    /* Responsive */
    @media (max-width: 1100px) {
      .office { width: 600px; height: 420px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-px">🏢</div>
    <span class="logo-text">DATTU OFFICE</span>
  </div>
  <div class="hdr-right">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLbl">Conectando...</span>
    <span style="color:var(--border)">|</span>
    <span id="activeStatus">--</span>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sb-sec">
      <div class="sb-label">Nova Tarefa</div>
      <textarea id="taskIn" class="task-ta" placeholder="Descreva a tarefa..."></textarea>
      <div class="task-row">
        <select id="priSel" class="sel">
          <option value="low">Baixa</option>
          <option value="medium" selected>Média</option>
          <option value="high">Alta</option>
          <option value="urgent">Urgente</option>
        </select>
        <button class="btn btn-pri" id="btnExec" onclick="sendTask()">▶ GO</button>
        <button class="btn btn-sec" onclick="openModal()" title="Reunião">🤝</button>
      </div>
      <div class="qb-row">
        <button class="qb" onclick="qt('Contratar dev fullstack sênior')">+Contratar</button>
        <button class="qb" onclick="qt('Campanha de marketing do produto')">+Campanha</button>
        <button class="qb" onclick="qt('Decisão sobre arquitetura')">+Decisão</button>
        <button class="qb" onclick="qt('Pauta para reunião de planejamento')">+Pauta</button>
      </div>
      <div class="prog"><div class="prog-fill" id="progFill"></div></div>
    </div>
    <div class="sb-sec">
      <div class="sb-label">Vault</div>
      <div class="vault-row" id="vaultRow"></div>
    </div>
    <div class="feed-lbl">Atividade</div>
    <div class="feed" id="feed">
      <div id="feedEmpty" style="text-align:center;padding:20px;color:var(--text-muted);font-size:11px;">
        Aguardando atividade...
      </div>
    </div>
  </div>

  <div class="office-wrap">
    <div class="office" id="office">
      <div class="office-floor"></div>
      <div class="wall-top"></div>
      <!-- JS renders everything here -->
    </div>

    <div class="chat-panel" id="chatPanel">
      <div class="ch-hdr">
        <div class="ch-av" id="chAv"></div>
        <div class="ch-info">
          <div class="ch-name" id="chName">Agente</div>
          <div class="ch-role" id="chRole">Cargo</div>
        </div>
        <button class="btn-x" onclick="closeChat()">✕</button>
      </div>
      <div class="ch-msgs" id="chMsgs">
        <div style="text-align:center;padding:20px;color:var(--text-muted);font-size:11px;">
          Clique em um personagem
        </div>
      </div>
      <div class="ch-input-row">
        <input type="text" class="ch-input" id="chInput" placeholder="Mensagem..." onkeydown="if(event.key==='Enter'){event.preventDefault();sendChat()}" />
        <button class="btn-snd" id="btnSnd" onclick="sendChat()">➤</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>INICIAR REUNIÃO</h3>
    <input class="modal-in" id="meetTopic" type="text" placeholder="Tema da reunião..." />
    <p style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">Participantes: Estratégia, RH, Criativo</p>
    <div class="modal-acts">
      <button class="btn btn-sec" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-pri" onclick="startMeeting()">Iniciar</button>
    </div>
  </div>
</div>

<script>
// ═══ Pixel Art Sprite System ═══

function spriteToSVG(rows, pal, scale) {
  const h = rows.length, w = Math.max(...rows.map(r => r.length));
  let rects = '';
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < rows[y].length; x++) {
      const c = rows[y][x];
      if (c === '.' || c === ' ') continue;
      const fill = pal[c];
      if (fill) rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="${fill}"/>`;
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w*scale}" height="${h*scale}" style="image-rendering:pixelated;image-rendering:crisp-edges;">${rects}</svg>`;
}

// ═══ Character Sprites (12x18 grid) ═══
// Paletas únicas por função na equipe Dattu

const BASE_ROWS = [
  '...oooooo...',
  '..ohhhhho...',
  '..ohhHhho...',
  '.ohsssssho..',
  '.ohse.esho..',
  '.ohsssssho..',
  '..ossmssso..',
  '...ossso....',
  '..oBBBBBo...',
  '.oaBBBBBao..',
  '.oabBBBbao..',
  '..oBBBBBo...',
  '...oBBBo....',
  '..opp.ppo...',
  '..opp.ppo...',
  '..opp.ppo...',
  '..oxx.xxo...',
  '...oo.oo....',
];

const CHAR_SPRITES = {
  'po':           { rows: BASE_ROWS, pal: { o:'#0a1020', h:'#5c3a1a', H:'#7a5030', s:'#fcd5b0', a:'#eec5a0', e:'#1a1a2e', m:'#cc7070', B:'#0369a1', b:'#0ea5e9', p:'#1e3a5f', x:'#1e293b' } },

// ═══ Socket.IO ═══
const socket = io();
socket.on('connect', () => setCon(true));
socket.on('disconnect', () => setCon(false));
socket.on('vault:stats', renderVault);

socket.on('log', d => addFeed(d.level, d.message));
socket.on('task:start', d => { setProc(true); addFeed('working','🚀 '+d.task); });
socket.on('task:routed', d => { if(d.agents) addFeed('info','🔀 → '+d.agents.map(r=>AG[r]?.name||r).join(', ')); });

socket.on('agent:start', d => {
  setCS(d.role,'working');
  showBub(d.role,'Trabalhando...',0);
  spawnP(d.role);
  addFeed('working', AG[d.role]?.emoji+' '+AG[d.role]?.name+' trabalhando...');
});
socket.on('agent:done', d => {
  setCS(d.role,'done');
  showBub(d.role,'Pronto!',2500);
  addFeed('success','✅ '+AG[d.role]?.name+' concluiu');
});
socket.on('agent:error', d => {
  setCS(d.role,'error');
  showBub(d.role,'Erro!',3000);
  addFeed('error','❌ '+d.name+': '+d.error);
});
socket.on('pipeline:stage', d => {
  const label = d.label || d.stage;
  addFeed('info', '⚡ Pipeline: ' + label + ' → ' + (AG[d.stage]?.name || d.stage));
});
socket.on('agent:rejected', d => {
  setCS(d.role,'error');
  showBub(d.role,'Rejeitado!',3000);
  addFeed('error','🔙 ' + (AG[d.role]?.name||d.role) + ' rejeitou: ' + (d.feedback||'').slice(0,80));
});
socket.on('task:done', d => {
  setProc(false);
  setTimeout(()=>(d.agentsInvolved||[]).forEach(r=>setCS(r,'idle')),3000);
  addFeed('success','✨ Concluído — '+(d.notesCreated?.length||0)+' nota(s)');
  if(d.summary) addFeed('info','📋 '+d.summary.slice(0,140));
});
socket.on('note:created', d => addFeed('note','📝 '+d.path));
socket.on('agent:typing', () => showTyp());
socket.on('chat:response', d => { hideTyp(); addCM('agent',d.role,d.message); enCI(); });
socket.on('error', d => { setProc(false); addFeed('error','❌ '+d.message); });

// ═══ Character State ═══
function setCS(role, status) {
  const st = states[role];
  if (!st) return;
  const el = st.el;
  el.className = `char ${status}`;
  if (selAgent === role) el.classList.add('selected');

  const dot = document.getElementById(`dot-${role}`);
  if (dot) dot.className = `char-dot ${status}`;

  // Monitor glow
  const mon = document.getElementById(`mon-${role}`);
  if (mon) {
    const sp = MONITOR_SPRITE;
    mon.innerHTML = spriteToSVG(sp.rows, status === 'working' ? MONITOR_ACTIVE_PAL : sp.pal, 3);
  }

  // Move char to desk when working
  if (status === 'working') {
    const dp = LAYOUT.desks[role];
    el.style.left = (dp.x + 25) + 'px';
    el.style.top = (dp.y - 10) + 'px';
  } else if (status === 'idle' || status === 'done') {
    el.style.left = el.dataset.hx + 'px';
    el.style.top = el.dataset.hy + 'px';
  }

  st.status = status;
  updateActive();
}

function updateActive() {
  const w = Object.values(states).filter(s => s && s.status === 'working').length;
  document.getElementById('activeStatus').textContent =
    w > 0 ? w + ' trabalhando' : 'Todos livres';
}

// ═══ Bubbles ═══
function showBub(role, text, dur) {
  const el = document.getElementById(`ch-${role}`);
  if (!el) return;
  let old = el.querySelector('.bubble');
  if (old) old.remove();
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  el.appendChild(b);
  if (bubTimers[role]) clearTimeout(bubTimers[role]);
  if (dur > 0) bubTimers[role] = setTimeout(() => { if (b.parentNode) b.remove(); }, dur);
}

// ═══ Particles ═══
function spawnP(role) {
  const el = document.getElementById(`ch-${role}`);
  if (!el) return;
  const icons = ['⚡','✨','💡','⚙️','📌'];
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'wpart';
      p.style.setProperty('--px', (Math.random()-.5)*40+'px');
      p.style.setProperty('--py', -(15+Math.random()*25)+'px');
      p.style.left = (5+Math.random()*30)+'px';
      p.style.top = '0px';
      p.textContent = icons[Math.floor(Math.random()*icons.length)];
      el.appendChild(p);
      setTimeout(()=>p.remove(), 1300);
    }, i*200);
  }
}

// ═══ Chat ═══
function openChat(role) {
  const m = AG[role]; if (!m) return;
  if (selAgent) { const p = document.getElementById(`ch-${selAgent}`); if(p) p.classList.remove('selected'); }
  selAgent = role;
  const ce = document.getElementById(`ch-${role}`);
  if (ce) ce.classList.add('selected');

  document.getElementById('chAv').style.cssText = `background:${m.color}22;border:2px solid ${m.color}66;font-size:18px;`;
  document.getElementById('chAv').textContent = m.emoji;
  document.getElementById('chName').textContent = m.name;
  document.getElementById('chRole').textContent = m.role;

  const msgs = document.getElementById('chMsgs');
  msgs.innerHTML = `<div style="text-align:center;padding:16px;font-size:10px;color:var(--text-muted);">
    ${m.emoji} Conversando com <strong style="color:var(--text)">${m.name}</strong>
  </div>`;

  document.getElementById('chatPanel').classList.add('open');
  document.getElementById('chInput').focus();
}

function closeChat() {
  document.getElementById('chatPanel').classList.remove('open');
  if (selAgent) { const e = document.getElementById(`ch-${selAgent}`); if(e) e.classList.remove('selected'); selAgent = null; }
}

function sendChat() {
  const inp = document.getElementById('chInput');
  const msg = inp.value.trim();
  if (!msg || !selAgent) return;
  addCM('user','Você',msg);
  inp.value = ''; inp.disabled = true;
  document.getElementById('btnSnd').disabled = true;
  socket.emit('chat:message', { role:selAgent, message:msg, sessionId:socket.id });
}

function addCM(type, sender, text) {
  const msgs = document.getElementById('chMsgs');
  const m = type==='agent' ? AG[sender] : null;
  const d = document.createElement('div');
  d.className = `cm ${type}`;
  d.innerHTML = `
    <div class="ms">${type==='agent' ? (m?.emoji||'')+' '+m?.name : sender}</div>
    <div class="mb">${esc(text)}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyp() {
  const msgs = document.getElementById('chMsgs');
  if (document.getElementById('typI')) return;
  const d = document.createElement('div'); d.id='typI'; d.className='typi';
  d.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function hideTyp() { const e = document.getElementById('typI'); if(e) e.remove(); }
function enCI() {
  document.getElementById('chInput').disabled = false;
  document.getElementById('btnSnd').disabled = false;
  document.getElementById('chInput').focus();
}

// ═══ Tasks ═══
function sendTask() {
  const inp = document.getElementById('taskIn');
  const t = inp.value.trim();
  if (!t || processing) return;
  socket.emit('task:submit', { task:t, priority:document.getElementById('priSel').value });
  inp.value = ''; inp.style.height = 'auto';
}
function qt(t) { document.getElementById('taskIn').value = t; sendTask(); }
function setProc(p) {
  processing = p;
  const b = document.getElementById('btnExec');
  const f = document.getElementById('progFill');
  b.disabled = p; b.textContent = p ? '⏳ ...' : '▶ GO';
  f.style.width = p ? '100%' : '0%';
  f.style.transition = p ? 'width 28s linear' : 'width .3s';
}

// ═══ Meeting ═══
function openModal() { document.getElementById('modalBg').classList.add('open'); document.getElementById('meetTopic').focus(); }
function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
function startMeeting() {
  const t = document.getElementById('meetTopic').value.trim();
  if (!t) return;
  socket.emit('meeting:start', { topic:t });
  closeModal();
  document.getElementById('meetTopic').value = '';
  addFeed('working','🤝 Reunião: '+t);
  ['po','ceo','tech-lead'].forEach((r,i) => {
    const el = document.getElementById(`ch-${r}`);
    if (!el) return;
    const sp = LAYOUT.meetingSpots[i];
    setTimeout(() => {
      el.className = 'char walking';
      setTimeout(() => {
        el.className = 'char idle';
        el.style.left = sp.x+'px';
        el.style.top = sp.y+'px';
        showBub(r,'Em reunião',0);
      }, 400);
    }, i*250);
  });
}

// ═══ Feed ═══
function addFeed(lvl, msg) {
  const f = document.getElementById('feed');
  const e = document.getElementById('feedEmpty'); if(e) e.remove();
  const t = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const d = document.createElement('div'); d.className='fi';
  d.innerHTML = `<div class="fd ${lvl}"></div><div><div class="ft">${esc(msg)}</div><div class="ftm">${t}</div></div>`;
  f.appendChild(d); f.scrollTop = f.scrollHeight;
  while (f.children.length > 50) f.removeChild(f.firstChild);
}

// ═══ Vault ═══
function renderVault(stats) {
  const r = document.getElementById('vaultRow'); r.innerHTML = '';
  for (const [k,v] of Object.entries(stats)) {
    const m = VAULT_META[k]||{e:'📁',l:k};
    const c = document.createElement('div'); c.className='vc';
    c.innerHTML = `<b>${v}</b>${m.e} ${m.l}`;
    c.onclick = () => loadVF(k);
    r.appendChild(c);
  }
}
async function loadVF(folder) {
  const m = VAULT_META[folder]||{e:'📁',l:folder};
  try {
    const res = await fetch(`/api/vault/notes/${folder}`);
    const notes = await res.json();
    addFeed('note',`${m.e} ${m.l}: ${notes.length} nota(s)`);
    notes.slice(0,3).forEach(n=>addFeed('info','📄 '+n.filename.replace('.md','')));
  } catch(e) { addFeed('error','Erro ao carregar'); }
}

// ═══ Conn ═══
function setCon(c) {
  document.getElementById('connDot').style.background = c?'var(--green)':'var(--red)';
  document.getElementById('connDot').style.boxShadow = c?'0 0 6px var(--green)':'0 0 6px var(--red)';
  document.getElementById('connLbl').textContent = c?'Online':'Offline';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══ Init ═══
document.addEventListener('DOMContentLoaded', () => {
  renderOffice();
  fetch('/api/vault/stats').then(r=>r.json()).then(renderVault).catch(()=>{});

  document.getElementById('taskIn').addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendTask(); }
  });
  document.getElementById('taskIn').addEventListener('input', function() {
    this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px';
  });
  document.getElementById('meetTopic').addEventListener('keydown', e => { if(e.key==='Enter') startMeeting(); });
  document.addEventListener('keydown', e => { if(e.key==='Escape'){closeModal();closeChat();} });
});
</script>
